services:
  backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    image: ghcr.io/codescales/esa-waypoint/backup:latest
    environment:
      - B2_KEY_ID=${B2_KEY_ID:?B2_KEY_ID is required}
      - B2_APP_KEY=${B2_APP_KEY:?B2_APP_KEY is required}
      - B2_BUCKET=${B2_BUCKET:-codescales-esa-backups}
      - B2_ENDPOINT=${B2_ENDPOINT:-https://s3.us-west-004.backblazeb2.com}
      - SOURCE_DIR=/app/output
      - BACKUP_CRON=${BACKUP_CRON:-0 * * * *}
      - KEEP_HOURLY=${KEEP_HOURLY:-5}
      - KEEP_DAILY=${KEEP_DAILY:-5}
    volumes:
      - ./output:/app/output:ro,z
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: ghcr.io/codescales/esa-waypoint/backend:latest
    ports:
      - "8000:8000"
    environment:
      - SPREADSHEET_PATH=/app/output/incentive_plan.xlsx
      - BRIEFS_DIR=/app/output/briefs
      - DB_PATH=/app/output/esa.db
      - REPO_TYPE=${REPO_TYPE:-sqlite}
      - SHARED_PASSWORD=${SHARED_PASSWORD:?SHARED_PASSWORD is required}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET is required}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3001}
      - SECURE_COOKIES=${SECURE_COOKIES:-true}
    volumes:
      - ./output:/app/output:rw,z

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: ghcr.io/codescales/esa-waypoint/frontend:latest
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://backend:8000
    volumes:
      - ./web/frontend/public/assets:/app/public/assets:ro,z
    depends_on:
      - backend
