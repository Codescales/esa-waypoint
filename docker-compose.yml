services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: localhost/esa-incentive-pipeline_backend:latest
    ports:
      - "8000:8000"
    environment:
      - SPREADSHEET_PATH=/app/output/incentive_plan.xlsx
      - BRIEFS_DIR=/app/output/briefs
      - DB_PATH=/app/output/esa.db
      - REPO_TYPE=${REPO_TYPE:-sqlite}
      - SHARED_PASSWORD=${SHARED_PASSWORD:-changeme}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3001}
    volumes:
      - ./output:/app/output:rw,z

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: localhost/esa-incentive-pipeline_frontend:latest
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
