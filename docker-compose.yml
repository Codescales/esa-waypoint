services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: ghcr.io/codescales/esa-waypoint/backend:latest
    ports:
      - "8000:8000"
    environment:
      - SPREADSHEET_PATH=/app/output/incentive_plan.xlsx
      - BRIEFS_DIR=/app/output/briefs
      - DB_PATH=/app/output/esa.db
      - REPO_TYPE=${REPO_TYPE:-sqlite}
      - SHARED_PASSWORD=${SHARED_PASSWORD:?SHARED_PASSWORD is required}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET is required}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3001}
      - SECURE_COOKIES=${SECURE_COOKIES:-true}
    volumes:
      - ./output:/app/output:rw,z

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: ghcr.io/codescales/esa-waypoint/frontend:latest
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
