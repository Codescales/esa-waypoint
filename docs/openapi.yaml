  /api/runners/{slug}:
    get:
      tags:
      - runners
      summary: Get Runner
      operationId: get_runner_api_runners__slug__get
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
          title: Slug
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunnerDTOResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      description: 'Returns runner identity and **current-marathon** run counts only.


        - `run_count` — number of runs in this event''s schedule

        - `esa_count` — distinct streams in this event (not all-time event count)

        - `first_esa` — earliest scheduled run date in the current marathon


        For all-time historical data (17 events, 26 appearances, first debut year,
        country, SRC tenure, ESA run history) call **GET /api/runners/{slug}/profile**.'
  /api/runners/{slug}/profile:
    get:
      tags:
      - runners
      summary: Get Runner Profile
      description: 'Returns the full composite runner profile sourced from lineup.esamarathon.dev
        and speedrun.com.


        This is the authoritative source for all historical ESA data:


        - `summary.event_count` — all-time ESA events attended

        - `summary.appearance_count` — all-time ESA run appearances

        - `summary.first_event` / `first_event_year` — historical debut

        - `summary.esa_game_count` — distinct games run at ESA across all events

        - `summary.country_name` — self-reported, unverified

        - `summary.src_tenure_years` — years on speedrun.com

        - `stats.past_esa.events[]` — ordered list of all event names attended

        - `stats.past_esa.esa_runs[]` — per-game/category history with event list

        - `stats.past_esa.first_appearance` — full details of debut run

        - `stats.tenure.label` — human-readable SRC tenure string

        - `stats.communities[]` — ESA-adjacent communities found in SRC/Twitch bio


        `has_profile: false` means no runner-profile cache entry exists; trigger `POST
        /api/admin/sync/runners?slug={slug}` to populate it.'
      operationId: get_runner_profile_api_runners__slug__profile_get
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
          title: Slug
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunnerProfileResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/runners/{slug}/pbs:
    get:
      tags:
      - runners
      summary: Get Runner Pbs
      operationId: get_runner_pbs_api_runners__slug__pbs_get
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
          title: Slug
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunnerPBsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/runners/{slug}/runs:
    get:
      tags:
      - runners
      summary: Get Runner Runs
      operationId: get_runner_runs_api_runners__slug__runs_get
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
          title: Slug
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RunDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
