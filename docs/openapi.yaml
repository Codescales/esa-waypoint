    RunnerProfileResponse:
      type: object
      description: 'Composite runner profile returned by GET /api/runners/{slug}/profile.


        This is the authoritative source for **all historical ESA data**: event counts,
        run history, first appearance, ESA games, country, community, and SRC tenure.
        The run_count/esa_count fields on RunnerDTO (GET /api/runners/{slug}) are
        scoped to the **current marathon only** — use this endpoint for all-time figures.'
      required:
      - slug
      - display_name
      - twitch
      - discord
      - twitter
      - pronouns
      - sources
      - errors
      - has_profile
      properties:
        slug:
          type: string
        display_name:
          type: string
        twitch:
          type: string
        discord:
          type: string
        twitter:
          type: string
        pronouns:
          type: string
        pronunciation:
          type: string
        summary:
          anyOf:
          - $ref: '#/components/schemas/RunnerSummary'
          - type: 'null'
        stats:
          anyOf:
          - $ref: '#/components/schemas/RunnerStats'
          - type: 'null'
        sources:
          type: array
          items:
            $ref: '#/components/schemas/BriefSidecarSource'
        errors:
          type: array
          items:
            type: string
        has_profile:
          type: boolean
          description: False when no runner-profile cache entry exists for this runner
    RunnerDTOResponse:
      type: object
      description: 'Runner identity and **current-marathon** run summary.


        **run_count** and **esa_count** reflect only runs in this event''s schedule.
        For all-time ESA history (17 events, 26 runs, first year, etc.) call GET /api/runners/{slug}/profile
        which reads from the runner-profile cache.'
      required:
      - slug
      - display_name
      - twitch
      - discord
      - twitter
      - pronouns
      properties:
        slug:
          type: string
        display_name:
          type: string
        twitch:
          type: string
        discord:
          type: string
        twitter:
          type: string
        pronouns:
          type: string
        pronunciation:
          type: string
        run_count:
          type: integer
          description: Runs in the **current marathon** only
        esa_count:
          type: integer
          description: Distinct streams in the **current marathon** only. For all-time
            event count see /profile
        first_esa:
          anyOf:
          - type: string
          - type: 'null'
          description: Date of first scheduled run in the current marathon (not historical
            debut)
        upcoming_runs:
          type: array
          items:
            $ref: '#/components/schemas/RunDTO'
          description: Next 5 upcoming runs for this runner
    RunnerPBsResponse:
      type: object
      required:
      - slug
      - display_name
      - pbs
      - has_pbs
      properties:
        slug:
          type: string
        display_name:
          type: string
        pbs:
