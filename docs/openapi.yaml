openapi: 3.1.0
info:
  title: ESA Host Brief Viewer
  version: 0.2.0
  description: 'ESA Incentive Pipeline backend API.


    **Authentication**


    - Host endpoints: require `esa_session` cookie (set via `POST /api/login`). Valid
    24h.

    - Admin endpoints: require `esa_admin_session` cookie (set via `POST /api/admin/login`).
    Valid 1h.


    **Base URL**: `https://esa-hosting.codescales.xyz`


    **AI/Tool discovery**


    - OpenAPI spec (this file): `GET /openapi.yaml`

    - Natural-language context doc: `GET /llms.txt`

    - Interactive UI: `GET /docs`'
  contact:
    name: ESA Incentive Pipeline
    url: https://github.com/BongoEADGC6/esa-incentive-pipeline
paths:
  /api/health:
    get:
      tags:
      - health
      summary: Health
      operationId: health_api_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaleInfo'
  /api/login:
    post:
      tags:
      - auth
      summary: Login
      operationId: login_api_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/logout:
    post:
      tags:
      - auth
      summary: Logout
      operationId: logout_api_logout_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/streams:
    get:
      tags:
      - streams
      summary: List Streams
      operationId: list_streams_api_streams_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /api/news:
    get:
      tags:
      - news
      summary: List News
      description: Gaming/speedrun news items for the host ticker (speedrun.com WRs/new
        runs + RSS gaming news). Requires host or admin session.
      operationId: list_news_api_news_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 50
          minimum: 1
          maximum: 200
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NewsItemDTO'
  /api/runs:
    get:
      tags:
      - runs
      summary: List Runs
      operationId: list_runs_api_runs_get
      parameters:
      - name: stream
        in: query
        required: false
        schema:
          type: string
          default: ''
          title: Stream
      - name: window
        in: query
        required: false
        schema:
          type: string
          default: ''
          title: Window
      - name: next_hours
        in: query
        required: false
        schema:
          type: number
          default: 0
          title: Next Hours
      - name: marathon
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Marathon
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RunDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/runs/{slug}:
    get:
      tags:
      - runs
      summary: Get Run
      operationId: get_run_api_runs__slug__get
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
          title: Slug
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/incentives:
    get:
      tags:
      - incentives
      summary: List Incentives
      operationId: list_incentives_api_incentives_get
      parameters:
      - name: run_slug
        in: query
        required: false
        schema:
          type: string
          default: ''
          title: Run Slug
      - name: status
        in: query
        required: false
        schema:
          type: string
          default: ''
          title: Status
      - name: category
        in: query
        required: false
        schema:
          type: string
          default: ''
          title: Category
      - name: stream
        in: query
        required: false
        schema:
          type: string
          default: ''
          title: Stream
      - name: upcoming
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Upcoming
        description: When true, only return incentives for runs that have not yet started.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IncentiveDTO'
                title: Response List Incentives Api Incentives Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - incentives
      summary: Create Incentive
      operationId: create_incentive_api_incentives_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncentiveCreateRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncentiveDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/incentives/{uuid}:
    get:
      tags:
      - incentives
      summary: Get Incentive
      operationId: get_incentive_api_incentives__uuid__get
      parameters:
      - name: uuid
        in: path
        required: true
        schema:
          type: string
          title: Uuid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncentiveDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - incentives
      summary: Patch Incentive
      operationId: patch_incentive_api_incentives__uuid__patch
      parameters:
      - name: uuid
        in: path
        required: true
        schema:
          type: string
          title: Uuid
      - name: esa_admin_session
        in: cookie
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Esa Admin Session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncentivePatch'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncentiveDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - incentives
      summary: Delete Incentive
      operationId: delete_incentive_api_incentives__uuid__delete
      parameters:
      - name: uuid
        in: path
        required: true
        schema:
          type: string
          title: Uuid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncentiveDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/briefs/{slug}:
    get:
      tags:
