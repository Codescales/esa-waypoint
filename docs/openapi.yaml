  /api/notes/active-host:
    get:
      tags:
      - notes
      summary: Get Active Host
      description: 'Return the currently active host (the host that new notes will
        be attributed to).


        Phase 2.4: returns the first active host (Anonymous Host). When OIDC

        ships, this returns the authenticated user.'
      operationId: get_active_host_api_notes_active_host_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiveHostDTO'
  /api/notes:
