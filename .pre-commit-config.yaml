repos:
  - repo: local
    hooks:
      - id: pytest-coverage
        name: pytest coverage (80% min)
        entry: uv run python -m pytest tests/ --cov=src --cov=web/backend --cov-config=.coveragerc --cov-fail-under=80
        language: system
        pass_filenames: false
        always_run: true

      - id: check-prod-imports
        name: check prod imports (no dev deps)
        entry: uv run --no-dev python -c "import src.pipeline; import src.brief; import src.tiltify; import src.tiltify_push; import src.xlsx_reader; import src.import_to_sqlite; import src.db; import src.snapshot; import src.audit; import src.incentives; import src.horaro; import src.oengus; import src.src_api; import src.slugs; import src.evaluate; import src.find_incentives; import src.check_horaro_parity; import src.spreadsheet; import src.brief_builder; print('All prod imports OK')"
        language: system
        pass_filenames: false
        always_run: true

      - id: bandit
        name: bandit (Python SAST)
        entry: uv tool run bandit -r src/ -ll -q
        language: system
        pass_filenames: false
        always_run: true

      - id: pip-audit
        name: pip-audit (Python dependency CVEs)
        entry: uv tool run pip-audit --desc on
        language: system
        pass_filenames: false
        always_run: true
        stages: [manual]

      - id: uv-lock
        name: uv lock (sync lockfile with pyproject.toml)
        entry: uv lock
        language: system
        pass_filenames: false
        files: ^pyproject\.toml$

      - id: hadolint-backend
        name: hadolint (Dockerfile.backend)
        entry: hadolint Dockerfile.backend
        language: system
        files: ^Dockerfile\.backend$

      - id: hadolint-frontend
        name: hadolint (Dockerfile.frontend)
        entry: hadolint Dockerfile.frontend
        language: system
        files: ^Dockerfile\.frontend$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks
        name: gitleaks (secret scanning)
        args: [--verbose]
        stages: [manual]
