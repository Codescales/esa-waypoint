name: Build and Push Docker Images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/codescales/esa-waypoint

jobs:
  build-amd64:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.backend
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan backend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/backend:latest
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          vuln-type: library

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.frontend
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan frontend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/frontend:latest
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          vuln-type: library

      - name: Build and push backup
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.backup
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/backup:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan backup image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/backup:latest
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          vuln-type: library

  merge-manifest:
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge multi-arch manifests
        run: |
          for img in backend frontend backup; do
            docker buildx imagetools create \
              -t ${{ env.IMAGE_PREFIX }}/$img:latest \
              ${{ env.IMAGE_PREFIX }}/$img:latest \
              ${{ env.IMAGE_PREFIX }}/$img:latest-arm64
          done

  build-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.backend
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/backend:latest-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.frontend
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/frontend:latest-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backup
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.backup
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/backup:latest-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
